services:
  - type: web
    name: jourknows-frontend-prod
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://jourknows-api-prod.onrender.com
